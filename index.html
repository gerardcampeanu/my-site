<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Family Hub</title>
    <meta
      name="description"
      content="The Family Hub for Victor, Gerard, and Tomas."
    >
    <link rel="icon" type="image/png" href="assets/site-icon.png">
    <link rel="apple-touch-icon" href="assets/site-icon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="site-shell">
      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow" id="site-label">The Family Hub</p>
        <h1 id="page-title">The Family Hub</h1>
        <p class="summary" id="page-summary">
          A simple home for Victor, Gerard, and Tomas. Each button opens the
          right place.
        </p>
      </section>

      <section class="people" aria-label="Family websites">
        <a
          class="person-card"
          data-person-link="gerard"
          href="http://gerard.campeanu.me/"
        >
          <img
            class="person-image"
            src="assets/gerard-avatar.png"
            alt="Gerard's music, apps, websites, and games"
          >
          <span>
            <strong>Gerard</strong>
            <small>Music, apps, websites &amp; games</small>
          </span>
        </a>

        <a
          class="person-card"
          data-person-link="tomas"
          href="http://tomas.campeanu.me/"
        >
          <img
            class="person-image"
            src="assets/tomas-avatar.png"
            alt="Tomas invention and creative projects icon"
          >
          <span>
            <strong>Tomas</strong>
            <small>Ideas, inventions &amp; projects</small>
          </span>
        </a>

        <a
          class="person-card"
          data-person-link="victor"
          href="https://victorcampeanu.me/"
        >
          <img
            class="person-image"
            src="assets/victor-avatar.png"
            alt="Victor portrait"
          >
          <span>
            <strong>Victor</strong>
            <small>Personal website</small>
          </span>
        </a>
      </section>
    </main>

    <script src="script.js?v=victor-real-site"></script>
  </body>
</html>
