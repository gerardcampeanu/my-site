<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Family Site</title>
    <meta
      name="description"
      content="A simple family website hub for Victor, Gerard, and Tomas."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="site-shell">
      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow" id="site-label">Family site</p>
        <h1 id="page-title">Family Site</h1>
        <p class="summary" id="page-summary">
          A simple home for Victor, Gerard, and Tomas. Each button opens the
          right place.
        </p>
      </section>

      <section class="people" aria-label="Family websites">
        <a
          class="person-card"
          data-person-link="gerard"
          href="http://gerard.campeanu.me/"
        >
          <img
            class="person-image"
            src="assets/gerard-avatar.png"
            alt="Gerard's music, apps, websites, and games"
          >
          <span>
            <strong>Gerard</strong>
            <small>Music, apps, websites &amp; games</small>
          </span>
        </a>

        <a
          class="person-card"
          data-person-link="tomas"
          href="http://tomas.campeanu.me/"
        >
          <span class="initial">T</span>
          <span>
            <strong>Tomas</strong>
            <small>Personal website</small>
          </span>
        </a>

        <a
          class="person-card"
          data-person-link="victor"
          href="https://victorcampeanu.me/"
        >
          <span class="initial">V</span>
          <span>
            <strong>Victor</strong>
            <small>Personal website</small>
          </span>
        </a>
      </section>
    </main>

    <script src="script.js?v=victor-real-site"></script>
  </body>
</html>
